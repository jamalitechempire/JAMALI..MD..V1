<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JAMALI MD | CYBER PANEL</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: radial-gradient(circle at 10% 20%, #050b1a, #010105);
            font-family: 'Inter', sans-serif;
            color: #fff;
            min-height: 100vh;
        }
        /* Background cyber grid */
        .cyber-bg {
            position: fixed;
            inset: 0;
            background: repeating-linear-gradient(0deg, rgba(0,246,255,0.05) 0px, rgba(0,246,255,0.05) 1px, transparent 1px, transparent 6px),
                        repeating-linear-gradient(90deg, rgba(0,246,255,0.05) 0px, rgba(0,246,255,0.05) 1px, transparent 1px, transparent 6px);
            z-index: -2;
        }
        .cyber-bg::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 50% 50%, rgba(0,246,255,0.15), transparent 70%);
            animation: pulse 6s infinite alternate;
        }
        @keyframes pulse { 0% { opacity: 0.3; } 100% { opacity: 1; } }
        /* Layout */
        .app {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 280px;
            background: rgba(5,10,25,0.85);
            backdrop-filter: blur(16px);
            border-right: 1px solid rgba(0,246,255,0.3);
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }
        .sidebar-logo {
            font-size: 1.8rem;
            font-weight: 800;
            font-family: 'Space Grotesk', monospace;
            background: linear-gradient(135deg, #00f6ff, #b400ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 40px;
        }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 20px;
            border-radius: 16px;
            margin-bottom: 12px;
            color: #aaa;
            cursor: pointer;
            transition: 0.3s;
        }
        .nav-item.active, .nav-item:hover {
            background: rgba(0,246,255,0.15);
            color: #00f6ff;
            border-left: 3px solid #00f6ff;
        }
        .main-content {
            margin-left: 280px;
            flex: 1;
            padding: 30px;
        }
        .glass-card {
            background: rgba(12,15,30,0.6);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(0,246,255,0.2);
            padding: 24px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px,1fr));
            gap: 24px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(0,0,0,0.5);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(0,246,255,0.2);
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            color: #00f6ff;
            text-shadow: 0 0 8px #00f6ff;
        }
        .btn-neon {
            background: linear-gradient(95deg, #00c6fb, #005bea);
            border: none;
            border-radius: 40px;
            padding: 12px 24px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #00f6ff;
            color: #00f6ff;
        }
        .input-cyber {
            background: #05080f;
            border: 1px solid #2a2f50;
            border-radius: 60px;
            padding: 14px 20px;
            color: white;
            width: 100%;
            outline: none;
        }
        .code-box {
            background: #000000aa;
            border-radius: 28px;
            padding: 20px;
            text-align: center;
            border: 1px solid #b400ff;
            cursor: pointer;
            margin-top: 20px;
        }
        .code-digits {
            font-size: 2rem;
            letter-spacing: 6px;
            font-weight: 800;
            color: #b400ff;
            font-family: monospace;
        }
        .cyber-table { width: 100%; border-collapse: collapse; }
        .cyber-table th, .cyber-table td { padding: 14px; text-align: left; border-bottom: 1px solid rgba(0,246,255,0.1); }
        .cyber-table th { color: #00f6ff; }
        .badge-online { background: rgba(0,255,136,0.2); color: #0f0; padding: 4px 12px; border-radius: 40px; }
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #111;
            padding: 10px 20px;
            border-radius: 40px;
            transition: 0.3s;
            z-index: 2000;
            border-left: 4px solid #00f6ff;
        }
        .toast-msg.show { transform: translateX(-50%) translateY(0); }
        @media (max-width: 900px) {
            .sidebar { width: 80px; padding: 20px 10px; }
            .sidebar .sidebar-logo { font-size: 0; }
            .sidebar .sidebar-logo i { font-size: 1.8rem; }
            .nav-item span { display: none; }
            .main-content { margin-left: 80px; }
        }
        @media (max-width: 600px) {
            .stats-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="cyber-bg"></div>
<div id="app"></div>
<script>
    // ======================= CONFIG =======================
    const ADMIN_USER = "Jamalitz";
    const ADMIN_PASS = "JAMALITECH@@@1234";
    let activeView = "dashboard";
    let adminAuth = false;
    let sessions = [];

    // Helper: show toast
    function toast(msg, type="info") {
        let t = document.getElementById("toastMsg");
        if(!t){ t=document.createElement("div"); t.id="toastMsg"; t.className="toast-msg"; document.body.appendChild(t); }
        t.innerText = msg;
        t.style.borderLeftColor = type==="error" ? "#ff4444" : "#00f6ff";
        t.classList.add("show");
        setTimeout(()=>t.classList.remove("show"),3000);
    }

    // Fetch active sessions
    async function fetchSessions() {
        try {
            let res = await fetch("/active");
            let data = await res.json();
            sessions = data.numbers || [];
        } catch(e) { sessions = []; }
        return sessions;
    }

    // Fetch uptime for a number
    async function fetchUptime(num) {
        try {
            let res = await fetch(`/status?number=${num}`);
            let data = await res.json();
            return (data.uptime || 0)+"s";
        } catch(e) { return "--"; }
    }

    // ======================= RENDER =======================
    async function render() {
        const appDiv = document.getElementById("app");
        const sess = await fetchSessions();
        let content = "";

        if (activeView === "pair") {
            content = `
                <div class="glass-card" style="max-width:550px; margin:0 auto;">
                    <h2 style="text-align:center"><i class="fas fa-link"></i> PAIR DEVICE</h2>
                    <div style="background:#0a0d1a; border-radius:1.5rem; padding:1rem; margin:1rem 0;">
                        <div style="display:flex; justify-content:space-between;"><span>👑 Owner</span><span>JAMALI TECH TZ <a href="https://wa.me/255784062158" style="color:#0f0">+255784062158</a></span></div>
                        <div style="display:flex; justify-content:space-between; margin-top:8px;"><span>📢 Channel</span><span><a href="https://whatsapp.com/channel/0029VbC7AgJK5cD71vGIpO3h" target="_blank" style="color:#0f0">Join</a></span></div>
                    </div>
                    <div><input type="tel" id="pairNumber" class="input-cyber" placeholder="255784062158" value="255"></div>
                    <button id="pairBtn" class="btn-neon" style="width:100%; margin:20px 0;"><i class="fas fa-key"></i> GENERATE CODE</button>
                    <div id="qrContainer" style="display:flex; justify-content:center; margin-bottom:15px;"></div>
                    <div class="code-box" id="codeBox">
                        <div class="code-digits" id="codeDisplay">—— —— ——</div>
                        <div style="font-size:0.7rem;"><i class="fas fa-copy"></i> click to copy</div>
                    </div>
                </div>
            `;
        } 
        else if (activeView === "dashboard") {
            let tableRows = "";
            if(sess.length===0) tableRows = "<tr><td colspan='4'>No active bots</td></tr>";
            else {
                for(let num of sess) {
                    let upt = await fetchUptime(num);
                    tableRows += `<tr><td>${num}</td><td><span class="badge-online">● ONLINE</span></td><td>${upt}</td><td><button class="btn-outline" style="padding:6px 12px;" onclick="disconnectNum('${num}')">Disconnect</button></td></tr>`;
                }
            }
            content = `
                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-value">${sess.length}</div><div>My Bots</div></div>
                    <div class="stat-card"><div class="stat-value">${sess.length}</div><div>Active</div></div>
                    <div class="stat-card"><div class="stat-value">⚡</div><div>JAMALI MD</div></div>
                </div>
                <div class="glass-card">
                    <h3><i class="fas fa-server"></i> Your Sessions</h3>
                    <div style="overflow-x:auto;"><table class="cyber-table"><thead><tr><th>Number</th><th>Status</th><th>Uptime</th><th>Action</th></tr></thead><tbody>${tableRows}</tbody></table></div>
                </div>
            `;
        }
        else if (activeView === "admin") {
            if(!adminAuth) {
                content = `<div class="glass-card" style="max-width:400px; margin:50px auto;"><h2>ADMIN LOGIN</h2><input id="adminUser" class="input-cyber" placeholder="Username"><input id="adminPass" class="input-cyber" type="password" placeholder="Password" style="margin-top:15px;"><button id="adminLoginBtn" class="btn-neon" style="margin-top:20px;">LOGIN</button></div>`;
            } else {
                let adminRows = "";
                for(let num of sess) {
                    let upt = await fetchUptime(num);
                    adminRows += `<tr><td>${num}</td><td><span class="badge-online">● ONLINE</span></td><td>${upt}</td><td><button class="btn-outline" onclick="togglePremium('${num}')">Premium</button></td><td><button class="btn-outline" onclick="disconnectNum('${num}')">Disconnect</button></td></tr>`;
                }
                content = `
                    <div class="stats-grid">
                        <div class="stat-card"><div class="stat-value">${sess.length}</div><div>Total Bots</div></div>
                        <div class="stat-card"><div class="stat-value">${sess.length}</div><div>Active</div></div>
                    </div>
                    <div class="glass-card">
                        <div style="display:flex; gap:15px; margin-bottom:20px;"><button class="btn-neon" onclick="reconnectAll()">Reconnect All</button><button class="btn-outline" onclick="disconnectAll()">Disconnect All</button></div>
                        <table class="cyber-table"><thead><tr><th>Number</th><th>Status</th><th>Uptime</th><th>Premium</th><th>Action</th></tr></thead><tbody>${adminRows}</tbody></table>
                    </div>
                `;
            }
        }

        // Sidebar + content
        const html = `
            <div class="app">
                <div class="sidebar">
                    <div class="sidebar-logo"><i class="fas fa-bolt"></i> JAMALI MD</div>
                    <div class="nav-item ${activeView==='pair'?'active':''}" data-view="pair"><i class="fas fa-link"></i><span>Pair</span></div>
                    <div class="nav-item ${activeView==='dashboard'?'active':''}" data-view="dashboard"><i class="fas fa-tachometer-alt"></i><span>Dashboard</span></div>
                    <div class="nav-item ${activeView==='admin'?'active':''}" data-view="admin"><i class="fas fa-shield-alt"></i><span>Admin</span></div>
                </div>
                <div class="main-content">${content}</div>
            </div>
        `;
        appDiv.innerHTML = html;
        attachEvents();
        if(activeView==='pair') attachPairEvents();
        if(activeView==='admin' && !adminAuth) attachAdminLogin();
    }

    function attachEvents() {
        document.querySelectorAll('.nav-item').forEach(el=>{
            el.addEventListener('click', (e)=>{
                activeView = el.getAttribute('data-view');
                render();
            });
        });
    }
    function attachPairEvents() {
        let btn = document.getElementById("pairBtn");
        if(btn) btn.onclick = async ()=>{
            let num = document.getElementById("pairNumber").value.replace(/\D/g,'');
            if(num.length<9) { toast("Invalid number","error"); return; }
            btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> ...';
            btn.disabled = true;
            let codeDiv = document.getElementById("codeDisplay");
            codeDiv.innerText = "⏳";
            try {
                let res = await fetch(`/code?number=${num}`);
                let data = await res.json();
                if(data.code) { codeDiv.innerText = data.code; toast("Code generated"); }
                else if(data.status==='already_connected') { codeDiv.innerText = "ALREADY ACTIVE"; toast("Already connected","error"); }
                else { codeDiv.innerText = "FAILED"; toast("Failed","error"); }
            } catch(e) { codeDiv.innerText = "ERROR"; toast("Server error","error"); }
            btn.innerHTML = '<i class="fas fa-key"></i> GENERATE CODE';
            btn.disabled = false;
        };
        let codeBox = document.getElementById("codeBox");
        if(codeBox) codeBox.onclick = ()=>{
            let code = document.getElementById("codeDisplay").innerText;
            if(code && code!=='—— —— ——' && code!=='FAILED' && code!=='ERROR' && code!=='ALREADY ACTIVE') {
                navigator.clipboard.writeText(code);
                toast("Copied!");
            } else toast("No code to copy","error");
        };
    }
    function attachAdminLogin() {
        let loginBtn = document.getElementById("adminLoginBtn");
        if(loginBtn) loginBtn.onclick = () => {
            let u = document.getElementById("adminUser").value;
            let p = document.getElementById("adminPass").value;
            if(u===ADMIN_USER && p===ADMIN_PASS) { adminAuth=true; render(); }
            else toast("Wrong credentials","error");
        };
    }

    // Global actions
    window.disconnectNum = async (num) => {
        if(confirm(`Disconnect ${num}?`)) { await fetch(`/disconnect?number=${num}`); toast("Disconnected"); render(); }
    };
    window.reconnectAll = async () => { await fetch("/connect-all"); toast("Reconnecting..."); setTimeout(()=>render(),2000); };
    window.disconnectAll = async () => { if(confirm("Disconnect ALL?")) { await fetch("/disconnect-all"); toast("All disconnected"); render(); } };
    window.togglePremium = async (num) => {
        try {
            let res = await fetch(`/api/config?number=${num}`);
            let cfg = await res.json();
            let newPremium = cfg.premium==='true'?'false':'true';
            await fetch(`/api/config/update`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({number:num,config:{premium:newPremium}})});
            toast(`Premium ${newPremium==='true'?'enabled':'disabled'} for ${num}`);
            render();
        } catch(e) { toast("Error","error"); }
    };

    render();
</script>
</body>
</html>
