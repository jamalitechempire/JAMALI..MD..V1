<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JAMALI MD | CYBERPAIR X</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 10% 20%, #050b1a, #010105);
            font-family: 'Inter', sans-serif;
            color: #fff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Glowing animated background */
        .cyber-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            background: repeating-linear-gradient(0deg, rgba(0, 246, 255, 0.03) 0px, rgba(0, 246, 255, 0.03) 2px, transparent 2px, transparent 6px);
        }
        .cyber-bg::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(0, 246, 255, 0.15), transparent 70%);
            animation: pulseGlow 6s infinite alternate;
        }
        @keyframes pulseGlow {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* Grid lines */
        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(rgba(0, 246, 255, 0.1) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(0, 246, 255, 0.1) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            pointer-events: none;
        }

        /* Main layout */
        .app-container {
            display: flex;
            min-height: 100vh;
            position: relative;
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: rgba(5, 10, 25, 0.85);
            backdrop-filter: blur(16px);
            border-right: 1px solid rgba(0, 246, 255, 0.3);
            padding: 30px 20px;
            transition: all 0.3s;
            z-index: 10;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
        }

        .sidebar-logo {
            font-size: 1.8rem;
            font-weight: 800;
            font-family: 'Space Grotesk', monospace;
            background: linear-gradient(135deg, #00f6ff, #b400ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 40px;
            letter-spacing: -1px;
        }

        .sidebar-logo i {
            background: none;
            -webkit-background-clip: unset;
            color: #00f6ff;
            margin-right: 8px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 20px;
            border-radius: 16px;
            margin-bottom: 12px;
            color: #aaa;
            transition: 0.3s;
            cursor: pointer;
            font-weight: 500;
        }

        .nav-item i {
            width: 24px;
            font-size: 1.2rem;
        }

        .nav-item.active, .nav-item:hover {
            background: rgba(0, 246, 255, 0.15);
            color: #00f6ff;
            box-shadow: 0 0 15px rgba(0, 246, 255, 0.2);
            border-left: 3px solid #00f6ff;
        }

        /* Main content */
        .main-content {
            margin-left: 280px;
            flex: 1;
            padding: 30px;
            transition: 0.3s;
        }

        /* Glass cards */
        .glass-card {
            background: rgba(12, 15, 30, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            border: 1px solid rgba(0, 246, 255, 0.2);
            padding: 24px;
            transition: 0.2s;
        }
        .glass-card:hover {
            border-color: rgba(0, 246, 255, 0.6);
            box-shadow: 0 0 20px rgba(0, 246, 255, 0.2);
        }

        /* Stats grid */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            border: 1px solid rgba(0, 246, 255, 0.2);
        }
        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            font-family: 'Space Grotesk', monospace;
            color: #00f6ff;
            text-shadow: 0 0 8px #00f6ff;
        }

        /* Buttons */
        .btn-neon {
            background: linear-gradient(95deg, #00c6fb, #005bea);
            border: none;
            border-radius: 40px;
            padding: 12px 24px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .btn-neon:hover {
            transform: scale(1.02);
            box-shadow: 0 0 20px #00c6fb;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #00f6ff;
            color: #00f6ff;
        }
        .btn-outline:hover {
            background: #00f6ff20;
        }

        /* Inputs */
        .input-cyber {
            background: #05080f;
            border: 1px solid #2a2f50;
            border-radius: 60px;
            padding: 14px 20px;
            color: white;
            width: 100%;
            outline: none;
            transition: 0.2s;
        }
        .input-cyber:focus {
            border-color: #00f6ff;
            box-shadow: 0 0 12px #00f6ff;
        }

        /* Code display */
        .code-box {
            background: #000000aa;
            border-radius: 28px;
            padding: 20px;
            text-align: center;
            border: 1px solid #b400ff;
            cursor: pointer;
            transition: 0.2s;
        }
        .code-digits {
            font-size: 2rem;
            letter-spacing: 6px;
            font-weight: 800;
            color: #b400ff;
            font-family: monospace;
        }

        /* Table */
        .cyber-table {
            width: 100%;
            border-collapse: collapse;
        }
        .cyber-table th, .cyber-table td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid rgba(0, 246, 255, 0.1);
        }
        .cyber-table th {
            color: #00f6ff;
        }

        /* Status badge */
        .badge-online {
            background: rgba(0, 255, 136, 0.2);
            color: #0f0;
            padding: 4px 12px;
            border-radius: 40px;
        }

        /* Toast */
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #111;
            padding: 10px 20px;
            border-radius: 40px;
            transition: 0.3s;
            z-index: 2000;
            border-left: 4px solid #00f6ff;
        }
        .toast-msg.show {
            transform: translateX(-50%) translateY(0);
        }

        /* Login form */
        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 70vh;
        }
        .login-card {
            max-width: 400px;
            width: 100%;
        }

        /* QR Code */
        .qr-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        canvas {
            background: white;
            border-radius: 20px;
            padding: 10px;
        }

        /* Responsive */
        @media (max-width: 900px) {
            .sidebar {
                width: 80px;
                padding: 20px 10px;
            }
            .sidebar .sidebar-logo {
                font-size: 0;
            }
            .sidebar .sidebar-logo i {
                font-size: 1.8rem;
            }
            .nav-item span {
                display: none;
            }
            .main-content {
                margin-left: 80px;
            }
        }
        @media (max-width: 600px) {
            .main-content {
                padding: 20px;
            }
            .stats-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Loading spinner */
        .loader {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(0, 246, 255, 0.3);
            border-top-color: #00f6ff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
</head>
<body>
<div class="cyber-bg"></div>
<div class="grid-overlay"></div>

<div id="appRoot"></div>

<script>
    // ===================== CONFIGURATION =====================
    const API_BASE = '';
    const ADMIN_USERNAME = "Jamalitz";
    const ADMIN_PASSWORD = "JAMALITECH@@@1234";

    // App state
    let currentView = 'dashboard';
    let adminAuthenticated = false;
    let activeSessions = [];
    let qrCodeGenerated = false;

    // Helper: show toast
    function showToast(message, type = 'info') {
        let toast = document.getElementById('globalToast');
        if (!toast) {
            toast = document.createElement('div');
            toast.id = 'globalToast';
            toast.className = 'toast-msg';
            document.body.appendChild(toast);
        }
        toast.innerText = message;
        toast.style.borderLeftColor = type === 'error' ? '#ff4444' : '#00f6ff';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }

    // Fetch active sessions
    async function fetchActiveSessions() {
        try {
            const res = await fetch(`${API_BASE}/active`);
            if (!res.ok) throw new Error();
            const data = await res.json();
            activeSessions = data.numbers || [];
            return activeSessions;
        } catch(e) {
            return [];
        }
    }

    // Fetch uptime for a session
    async function fetchUptime(number) {
        try {
            const res = await fetch(`${API_BASE}/status?number=${number}`);
            if (!res.ok) return '--';
            const data = await res.json();
            return (data.uptime || 0) + 's';
        } catch(e) {
            return '--';
        }
    }

    // Generate QR code for pairing (simulate using number)
    function generateQrForNumber(number) {
        const qrDiv = document.getElementById('qrCodeContainer');
        if (!qrDiv) return;
        qrDiv.innerHTML = '';
        // In real scenario, you'd get pairing code from backend and encode it as QR
        // For now, we simulate: encode the pairing endpoint URL with number
        const pairingUrl = `${window.location.origin}/code?number=${number}`;
        new QRCode(qrDiv, {
            text: pairingUrl,
            width: 200,
            height: 200,
            colorDark: "#00f6ff",
            colorLight: "#000000",
            correctLevel: QRCode.CorrectLevel.H
        });
        showToast("QR generated! Scan with WhatsApp to pair.", "success");
    }

    // ===================== RENDER FUNCTIONS =====================
    function renderPairSection() {
        return `
            <div class="glass-card" style="max-width: 600px; margin: 0 auto;">
                <div style="text-align: center;">
                    <i class="fas fa-qrcode" style="font-size: 3rem; color: #00f6ff; margin-bottom: 1rem;"></i>
                    <h2 style="font-family: 'Space Grotesk';">⚡ PAIR DEVICE</h2>
                    <p>Classic pairing code or QR scan</p>
                </div>
                <div class="info-panel" style="background: #0a0d1a; border-radius: 1.5rem; padding: 1rem; margin-bottom: 1.5rem;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 10px;">
                        <span><i class="fas fa-crown"></i> Owner</span>
                        <span><strong>JAMALI TECH TZ</strong> <i class="fab fa-whatsapp"></i> <a href="https://wa.me/255784062158" style="color:#0f0">+255 784 062 158</a></span>
                    </div>
                    <div style="display: flex; justify-content: space-between;">
                        <span><i class="fas fa-hashtag"></i> Channel</span>
                        <span><a href="https://whatsapp.com/channel/0029VbC7AgJK5cD71vGIpO3h" target="_blank" style="color:#0f0">Join Channel →</a></span>
                    </div>
                </div>
                <div class="status-chip" style="display: flex; justify-content: space-between; gap: 12px; margin-bottom: 20px;">
                    <div><i class="fas fa-circle" style="color: #0f0; font-size: 0.8rem;"></i> System Online</div>
                    <div id="pairLiveStatus"><i class="fas fa-spinner fa-pulse"></i> Checking...</div>
                </div>
                <div class="input-group">
                    <input type="tel" id="pairNumber" class="input-cyber" placeholder="Enter number with country code (e.g., 255784062158)" value="255">
                </div>
                <div style="display: flex; gap: 12px; margin: 20px 0;">
                    <button id="generatePairBtn" class="btn-neon" style="flex:1"><i class="fas fa-key"></i> GET CODE</button>
                    <button id="generateQrBtn" class="btn-outline" style="flex:1"><i class="fas fa-qrcode"></i> QR PAIR</button>
                </div>
                <div id="qrCodeContainer" class="qr-container" style="justify-content: center;"></div>
                <div class="code-box" id="codeBox" onclick="copyPairCode()">
                    <div class="code-digits" id="pairCodeDisplay">—— —— ——</div>
                    <div style="font-size: 0.7rem; margin-top: 8px;"><i class="fas fa-copy"></i> tap to copy</div>
                </div>
            </div>
        `;
    }

    async function renderUserDashboard() {
        const sessions = await fetchActiveSessions();
        let sessionsHtml = '';
        if (sessions.length === 0) {
            sessionsHtml = '<tr><td colspan="4">No active bots. Use Pair Device to connect.</td></tr>';
        } else {
            for (let num of sessions) {
                const uptime = await fetchUptime(num);
                sessionsHtml += `
                    <tr>
                        <td>${num}</td>
                        <td><span class="badge-online">● ONLINE</span></td>
                        <td>${uptime}</td>
                        <td><button class="btn-outline" style="padding: 6px 12px;" onclick="disconnectSession('${num}')">Disconnect</button></td>
                    </tr>
                `;
            }
        }
        return `
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value">${sessions.length}</div><div>My Bots</div></div>
                <div class="stat-card"><div class="stat-value">${sessions.length}</div><div>Active</div></div>
                <div class="stat-card"><div class="stat-value">⚡</div><div>JAMALI MD</div></div>
            </div>
            <div class="glass-card">
                <h3><i class="fas fa-server"></i> Your Active Sessions</h3>
                <div style="overflow-x: auto; margin-top: 20px;">
                    <table class="cyber-table">
                        <thead><tr><th>Number</th><th>Status</th><th>Uptime</th><th>Actions</th></tr></thead>
                        <tbody>${sessionsHtml}</tbody>
                    </table>
                </div>
            </div>
        `;
    }

    async function renderAdminPanel() {
        if (!adminAuthenticated) {
            return `
                <div class="login-container">
                    <div class="glass-card login-card">
                        <h2><i class="fas fa-shield-alt"></i> ADMIN ACCESS</h2>
                        <input type="text" id="adminUser" class="input-cyber" placeholder="Username" style="margin-bottom: 15px;">
                        <input type="password" id="adminPass" class="input-cyber" placeholder="Password">
                        <button id="adminLoginBtn" class="btn-neon" style="width: 100%; margin-top: 20px;">LOGIN</button>
                    </div>
                </div>
            `;
        }
        const sessions = await fetchActiveSessions();
        let sessionsHtml = '';
        if (sessions.length === 0) {
            sessionsHtml = '<tr><td colspan="5">No bots connected</td></tr>';
        } else {
            for (let num of sessions) {
                const uptime = await fetchUptime(num);
                sessionsHtml += `
                    <tr id="admin-row-${num}">
                        <td>${num}</td>
                        <td><span class="badge-online">● ONLINE</span></td>
                        <td>${uptime}</td>
                        <td><button class="btn-outline" style="padding: 4px 12px;" onclick="togglePremium('${num}')">Toggle Premium</button></td>
                        <td><button class="btn-outline" onclick="disconnectSession('${num}')">Disconnect</button></td>
                    </tr>
                `;
            }
        }
        return `
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value">${sessions.length}</div><div>Total Bots</div></div>
                <div class="stat-card"><div class="stat-value">${sessions.length}</div><div>Active</div></div>
                <div class="stat-card"><div class="stat-value" id="premiumCountAdmin">0</div><div>Premium Bots</div></div>
            </div>
            <div class="glass-card">
                <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 15px;">
                    <h3><i class="fas fa-microchip"></i> All Bot Sessions</h3>
                    <button class="btn-neon" onclick="reconnectAllBots()">Reconnect All</button>
                    <button class="btn-outline" onclick="disconnectAllBots()">Disconnect All</button>
                </div>
                <div style="overflow-x: auto; margin-top: 20px;">
                    <table class="cyber-table">
                        <thead><tr><th>Number</th><th>Status</th><th>Uptime</th><th>Premium</th><th>Actions</th></tr></thead>
                        <tbody>${sessionsHtml}</tbody>
                    </table>
                </div>
            </div>
        `;
    }

    async function renderMain() {
        const mainDiv = document.getElementById('appRoot');
        let content = '';
        if (currentView === 'pair') {
            content = renderPairSection();
        } else if (currentView === 'dashboard') {
            content = await renderUserDashboard();
        } else if (currentView === 'admin') {
            content = await renderAdminPanel();
        }

        const sidebar = `
            <div class="sidebar">
                <div class="sidebar-logo"><i class="fas fa-bolt"></i> JAMALI MD</div>
                <div class="nav-item ${currentView === 'pair' ? 'active' : ''}" data-view="pair">
                    <i class="fas fa-link"></i><span>Pair Device</span>
                </div>
                <div class="nav-item ${currentView === 'dashboard' ? 'active' : ''}" data-view="dashboard">
                    <i class="fas fa-tachometer-alt"></i><span>Dashboard</span>
                </div>
                <div class="nav-item ${currentView === 'admin' ? 'active' : ''}" data-view="admin">
                    <i class="fas fa-shield-alt"></i><span>Admin Panel</span>
                </div>
            </div>
            <div class="main-content">
                ${content}
            </div>
        `;
        mainDiv.innerHTML = `<div class="app-container">${sidebar}</div>`;
        attachEvents();
        if (currentView === 'pair') attachPairEvents();
        if (currentView === 'admin' && !adminAuthenticated) attachAdminLogin();
        updateLiveStatus();
    }

    function attachEvents() {
        document.querySelectorAll('.nav-item').forEach(el => {
            el.addEventListener('click', (e) => {
                const view = el.getAttribute('data-view');
                if (view) {
                    currentView = view;
                    renderMain();
                }
            });
        });
    }

    function attachPairEvents() {
        const generateBtn = document.getElementById('generatePairBtn');
        const qrBtn = document.getElementById('generateQrBtn');
        if (generateBtn) {
            generateBtn.onclick = async () => {
                let number = document.getElementById('pairNumber')?.value;
                if (!number) return showToast("Enter number", "error");
                number = number.replace(/\D/g, '');
                if (number.length < 9) return showToast("Invalid number", "error");
                const btn = generateBtn;
                btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> PROCESSING...';
                btn.disabled = true;
                const codeDiv = document.getElementById('pairCodeDisplay');
                codeDiv.innerText = '⏳';
                try {
                    const res = await fetch(`${API_BASE}/code?number=${number}`);
                    const data = await res.json();
                    if (data.code) {
                        codeDiv.innerText = data.code;
                        showToast("✅ Code generated", "success");
                    } else if (data.status === 'already_connected') {
                        codeDiv.innerText = 'ALREADY ACTIVE';
                        showToast("Bot already connected", "info");
                    } else {
                        codeDiv.innerText = 'FAILED';
                        showToast("Failed", "error");
                    }
                } catch(e) {
                    codeDiv.innerText = 'ERROR';
                    showToast("Server error", "error");
                }
                btn.innerHTML = '<i class="fas fa-key"></i> GET CODE';
                btn.disabled = false;
            };
        }
        if (qrBtn) {
            qrBtn.onclick = () => {
                let number = document.getElementById('pairNumber')?.value;
                if (!number) return showToast("Enter number", "error");
                number = number.replace(/\D/g, '');
                if (number.length < 9) return showToast("Invalid number", "error");
                generateQrForNumber(number);
            };
        }
        window.copyPairCode = () => {
            const code = document.getElementById('pairCodeDisplay')?.innerText;
            if (code && code !== '—— —— ——' && code !== 'FAILED' && code !== 'ERROR' && code !== 'ALREADY ACTIVE' && code !== '⏳') {
                navigator.clipboard.writeText(code);
                showToast("Code copied!");
            } else showToast("No code to copy", "error");
        };
    }

    function attachAdminLogin() {
        const loginBtn = document.getElementById('adminLoginBtn');
        if (loginBtn) {
            loginBtn.onclick = () => {
                const user = document.getElementById('adminUser')?.value;
                const pass = document.getElementById('adminPass')?.value;
                if (user === ADMIN_USERNAME && pass === ADMIN_PASSWORD) {
                    adminAuthenticated = true;
                    renderMain();
                } else {
                    showToast("Invalid credentials", "error");
                }
            };
        }
    }

    // Global functions
    window.disconnectSession = async (number) => {
        if (confirm(`Disconnect bot for ${number}?`)) {
            await fetch(`${API_BASE}/disconnect?number=${number}`);
            showToast(`Bot ${number} disconnected`);
            renderMain();
        }
    };
    window.reconnectAllBots = async () => {
        await fetch(`${API_BASE}/connect-all`);
        showToast("Reconnecting all bots...");
        setTimeout(() => renderMain(), 3000);
    };
    window.disconnectAllBots = async () => {
        if (confirm("⚠️ Disconnect ALL bots?")) {
            await fetch(`${API_BASE}/disconnect-all`);
            showToast("All bots disconnected");
            renderMain();
        }
    };
    window.togglePremium = async (number) => {
        try {
            const res = await fetch(`${API_BASE}/api/config?number=${number}`);
            let cfg = await res.json();
            const newPremium = cfg.premium !== 'true' ? 'true' : 'false';
            await fetch(`${API_BASE}/api/config/update`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ number, config: { premium: newPremium } })
            });
            showToast(`Premium toggled for ${number}`);
            renderMain();
        } catch(e) { showToast("Error", "error"); }
    };

    async function updateLiveStatus() {
        try {
            const res = await fetch(`${API_BASE}/ping`);
            const online = res.ok;
            const statusDiv = document.getElementById('pairLiveStatus');
            if (statusDiv) statusDiv.innerHTML = online ? '<i class="fas fa-circle" style="color:#0f0"></i> Server Online' : '<i class="fas fa-circle" style="color:#ff4444"></i> Server Offline';
        } catch(e) {
            const statusDiv = document.getElementById('pairLiveStatus');
            if (statusDiv) statusDiv.innerHTML = '<i class="fas fa-circle" style="color:#ff4444"></i> Server Offline';
        }
    }

    // Start
    renderMain();
    setInterval(updateLiveStatus, 10000);
</script>
</body>
</html>
