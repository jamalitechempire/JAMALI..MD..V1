<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMALI MD | User Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:linear-gradient(135deg,#0a0a0a,#0a0f1a,#000428);font-family:'Inter',sans-serif;color:#fff;padding:20px}
        .container{max-width:1200px;margin:0 auto}
        .header{background:rgba(10,10,20,0.6);backdrop-filter:blur(20px);border-radius:28px;padding:20px;display:flex;justify-content:space-between;flex-wrap:wrap;margin-bottom:30px}
        .logo h1{background:linear-gradient(135deg,#00f6ff,#b400ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .stats{display:flex;gap:15px}
        .stat-card{background:rgba(0,0,0,0.5);border-radius:24px;padding:10px 20px;text-align:center}
        .stat-number{font-size:2rem;color:#00f6ff}
        .nav-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:25px;margin-bottom:40px}
        .nav-card{background:rgba(255,255,255,0.03);border-radius:28px;padding:30px;text-align:center;cursor:pointer;transition:0.3s}
        .nav-card:hover{transform:translateY(-8px);border-color:#00f6ff}
        .sessions-section{background:rgba(255,255,255,0.03);border-radius:28px;padding:25px;overflow-x:auto}
        table{width:100%;border-collapse:collapse}
        th,td{padding:15px;text-align:left;border-bottom:1px solid rgba(255,255,255,0.1)}
        th{color:#00f6ff}
        .footer{text-align:center;margin-top:30px;opacity:0.6}
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo"><h1>⚡ JAMALI MD</h1><p>Your Personal Bot Dashboard</p></div>
        <div class="stats"><div class="stat-card"><div class="stat-number" id="totalSessions">0</div><div>My Sessions</div></div></div>
    </div>
    <div class="nav-grid">
        <div class="nav-card" onclick="location.href='/pair'"><div class="nav-icon"><i class="fas fa-link fa-3x"></i></div><h3>Pair Device</h3><p>Connect new device</p></div>
        <div class="nav-card" onclick="location.href='/config'"><div class="nav-icon"><i class="fas fa-sliders-h fa-3x"></i></div><h3>Bot Config</h3><p>Adjust your bot</p></div>
        <div class="nav-card" onclick="window.open('https://whatsapp.com/channel/0029VbC7AgJK5cD71vGIpO3h','_blank')"><div class="nav-icon"><i class="fab fa-whatsapp fa-3x"></i></div><h3>Join Channel</h3><p>Get updates</p></div>
    </div>
    <div class="sessions-section">
        <h3><i class="fas fa-server"></i> Your Active Bots</h3>
        <div style="overflow-x:auto; margin-top:20px">
            <table id="userSessionsTable"><thead><tr><th>Number</th><th>Status</th><th>Uptime</th><th>Actions</th></tr></thead><tbody id="userSessionsBody"><tr><td colspan="4">Loading...</td></tr></tbody></table>
        </div>
    </div>
    <div class="footer">Powered by JAMALI TECH TZ | © 2026</div>
</div>
<script>
    async function loadMySessions() {
        try{
            let res = await fetch('/active');
            let data = await res.json();
            document.getElementById('totalSessions').innerText = data.count || 0;
            let tbody = document.getElementById('userSessionsBody');
            if(data.numbers && data.numbers.length) {
                tbody.innerHTML = '';
                for(let num of data.numbers) {
                    let statusRes = await fetch(`/status?number=${num}`);
                    let statusData = await statusRes.json();
                    let row = tbody.insertRow();
                    row.innerHTML = `<td>${num}</td><td><span style="color:#0f0">● ONLINE</span></td><td>${statusData.uptime||0}s</td><td><button onclick="viewConfig('${num}')">⚙️ Config</button> <button onclick="disconnect('${num}')">🔌 Disconnect</button></td>`;
                }
            } else { tbody.innerHTML = '<tr><td colspan="4">No active sessions. Use Pair Device to connect.</td></tr>'; }
        } catch(e){}
    }
    function viewConfig(num){ window.location.href = `/config?number=${num}`; }
    async function disconnect(num){ if(confirm(`Disconnect bot for ${num}?`)){ await fetch(`/disconnect?number=${num}`); loadMySessions(); } }
    loadMySessions(); setInterval(loadMySessions,10000);
</script>
</body>
</html>
