<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JAMALI MD | Bot Config</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:radial-gradient(circle at 10% 30%,#0a0f1e,#03050b);font-family:'Inter',sans-serif;color:#fff;padding:20px}
        .container{max-width:700px;margin:auto}
        .card{background:rgba(12,15,25,0.65);backdrop-filter:blur(16px);border-radius:32px;border:1px solid rgba(0,242,254,0.25);padding:30px;margin-top:50px}
        h2{margin-bottom:25px;background:linear-gradient(135deg,#00f6ff,#b400ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .form-group{margin-bottom:20px}
        label{display:block;margin-bottom:8px;color:#00f6ff}
        input,select{width:100%;padding:12px;background:#0005;border:1px solid rgba(0,246,255,0.3);border-radius:20px;color:#fff}
        button{background:linear-gradient(105deg,#00c6fb,#005bea);border:none;border-radius:40px;padding:12px 24px;font-weight:bold;cursor:pointer;color:white;width:100%;margin-top:20px}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#111;padding:10px 20px;border-radius:40px;display:none}
    </style>
</head>
<body>
<div class="container">
    <div class="card">
        <h2><i class="fas fa-sliders-h"></i> JAMALI MD Configuration</h2>
        <form id="configForm">
            <div class="form-group"><label>Bot Prefix</label><input type="text" id="prefix" value="."></div>
            <div class="form-group"><label>Work Mode</label><select id="workMode"><option>public</option><option>private</option></select></div>
            <div class="form-group"><label>Auto View Status</label><select id="autoView"><option>true</option><option>false</option></select></div>
            <div class="form-group"><label>Auto Like Status</label><select id="autoLike"><option>true</option><option>false</option></select></div>
            <div class="form-group"><label>Anti-Call</label><select id="antiCall"><option>false</option><option>true</option></select></div>
            <div class="form-group"><label>Anti-Delete</label><select id="antiDelete"><option>false</option><option>true</option></select></div>
            <button type="button" onclick="saveConfig()">Save Configuration</button>
        </form>
    </div>
</div>
<div id="toast" class="toast"></div>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const botNumber = urlParams.get('number') || '';
    async function loadConfig(){
        if(!botNumber) return;
        let res = await fetch(`/api/config?number=${botNumber}`);
        let cfg = await res.json();
        document.getElementById('prefix').value = cfg.PREFIX || '.';
        document.getElementById('workMode').value = cfg.WORK_TYPE || 'public';
        document.getElementById('autoView').value = cfg.AUTO_VIEW_STATUS || 'true';
        document.getElementById('autoLike').value = cfg.AUTO_LIKE_STATUS || 'true';
        document.getElementById('antiCall').value = cfg.ANTI_CALL || 'false';
        document.getElementById('antiDelete').value = cfg.ANTI_DELETE || 'false';
    }
    async function saveConfig(){
        let payload = {
            PREFIX: document.getElementById('prefix').value,
            WORK_TYPE: document.getElementById('workMode').value,
            AUTO_VIEW_STATUS: document.getElementById('autoView').value,
            AUTO_LIKE_STATUS: document.getElementById('autoLike').value,
            ANTI_CALL: document.getElementById('antiCall').value,
            ANTI_DELETE: document.getElementById('antiDelete').value
        };
        let res = await fetch('/api/config/global', {
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body: JSON.stringify(payload)
        });
        if(res.ok) alert('✅ Configuration saved');
        else alert('❌ Error saving');
    }
    if(botNumber) loadConfig();
    else document.querySelector('.card h2').innerHTML = '<i class="fas fa-exclamation-triangle"></i> No bot selected';
</script>
</body>
</html>
