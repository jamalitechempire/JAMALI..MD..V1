<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JAMALI MD | Admin Nexus</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(circle at 20% 30%, #0a0f1e, #03050b);
            font-family: 'Inter', sans-serif;
            color: #fff;
            min-height: 100vh;
            display: flex;
        }

        /* SIDEBAR */
        .sidebar {
            width: 280px;
            background: rgba(5, 10, 20, 0.85);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(0, 246, 255, 0.2);
            padding: 30px 20px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 10;
        }

        .logo {
            font-size: 1.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #00f6ff, #b400ff);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            text-align: center;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 14px 20px;
            border-radius: 16px;
            margin-bottom: 10px;
            color: #aaa;
            transition: 0.3s;
            cursor: pointer;
        }

        .nav-item i { width: 24px; font-size: 1.2rem; }
        .nav-item.active, .nav-item:hover {
            background: rgba(0, 246, 255, 0.15);
            color: #00f6ff;
            border-left: 3px solid #00f6ff;
        }

        /* MAIN CONTENT */
        .main {
            margin-left: 280px;
            flex: 1;
            padding: 30px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 24px;
            margin-bottom: 40px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(0, 246, 255, 0.2);
            border-radius: 28px;
            padding: 24px;
            transition: 0.3s;
        }
        .stat-card:hover { transform: translateY(-5px); border-color: #00f6ff; box-shadow: 0 0 20px rgba(0,246,255,0.2); }
        .stat-title { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 2px; opacity: 0.7; }
        .stat-value { font-size: 2.5rem; font-weight: 700; color: #00f6ff; margin-top: 10px; }

        .sessions-table {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 28px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            overflow-x: auto;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 16px 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.05); }
        th { color: #00f6ff; font-weight: 600; }
        .action-buttons { display: flex; gap: 10px; }
        .action-btn { background: none; border: none; cursor: pointer; font-size: 1.2rem; transition: 0.2s; }
        .action-btn.view { color: #00f6ff; }
        .action-btn.reconnect { color: #00ff88; }
        .action-btn.disconnect { color: #ff4444; }
        .action-btn:hover { transform: scale(1.1); }

        .global-actions { display: flex; gap: 15px; margin-bottom: 30px; flex-wrap: wrap; }
        .global-btn { background: linear-gradient(135deg, #00f6ff, #b400ff); border: none; padding: 12px 24px; border-radius: 40px; font-weight: 600; cursor: pointer; transition: 0.3s; color: #000; }
        .global-btn.danger { background: linear-gradient(135deg, #ff4444, #cc0000); color: white; }
        .global-btn:hover { transform: translateY(-2px); filter: brightness(1.05); }

        @media (max-width: 900px) {
            .sidebar { width: 80px; padding: 20px 10px; }
            .sidebar .logo { font-size: 0; }
            .sidebar .logo::after { content: "JM"; font-size: 1.5rem; background: linear-gradient(135deg,#00f6ff,#b400ff); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
            .nav-item span { display: none; }
            .nav-item { justify-content: center; }
            .main { margin-left: 80px; }
        }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="logo">JAMALI MD</div>
    <div class="nav-item active" onclick="showSection('overview')"><i class="fas fa-tachometer-alt"></i><span>Overview</span></div>
    <div class="nav-item" onclick="showSection('sessions')"><i class="fas fa-server"></i><span>Sessions</span></div>
    <div class="nav-item" onclick="showSection('settings')"><i class="fas fa-lock"></i><span>Security</span></div>
    <div class="nav-item" onclick="window.location.href='/dashboard'"><i class="fas fa-arrow-left"></i><span>Exit</span></div>
</div>

<div class="main">
    <div id="overviewSection">
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-title">TOTAL SESSIONS</div><div class="stat-value" id="totalSessions">0</div></div>
            <div class="stat-card"><div class="stat-title">ACTIVE NOW</div><div class="stat-value" id="activeSessions">0</div></div>
            <div class="stat-card"><div class="stat-title">TOTAL COMMANDS</div><div class="stat-value" id="totalCommands">0</div></div>
            <div class="stat-card"><div class="stat-title">UPTIME</div><div class="stat-value" id="uptime">0h</div></div>
        </div>
        <div class="global-actions">
            <button class="global-btn" onclick="reconnectAll()"><i class="fas fa-sync-alt"></i> Reconnect All</button>
            <button class="global-btn danger" onclick="disconnectAll()"><i class="fas fa-power-off"></i> Disconnect All</button>
            <button class="global-btn" onclick="refreshSessions()"><i class="fas fa-refresh"></i> Refresh</button>
        </div>
    </div>

    <div id="sessionsSection" style="display: none;">
        <div class="sessions-table">
            <h3 style="margin-bottom:20px"><i class="fas fa-microchip"></i> Active Bot Sessions</h3>
            <table id="sessionsTable">
                <thead><tr><th>Number</th><th>Status</th><th>Uptime</th><th>Messages</th><th>Commands</th><th>Actions</th></tr></thead>
                <tbody id="sessionsBody"><tr><td colspan="6">Loading...</td></tr></tbody>
            </table>
        </div>
    </div>

    <div id="settingsSection" style="display: none;">
        <div class="sessions-table">
            <h3><i class="fas fa-shield-alt"></i> Admin Security</h3>
            <div class="setting-item" style="display:flex; justify-content:space-between; padding:15px 0; border-bottom:1px solid rgba(255,255,255,0.1)">
                <span>Change Admin Key</span>
                <input type="password" id="newKey" placeholder="New secret key" style="background:#000; border:1px solid #00f6ff; border-radius:12px; padding:8px 15px; color:white">
                <button class="global-btn" onclick="updateAdminKey()">Update</button>
            </div>
            <div class="setting-item" style="display:flex; justify-content:space-between; padding:15px 0">
                <span>Database Status</span>
                <span style="color:#00ff88"><i class="fas fa-check-circle"></i> Connected</span>
            </div>
        </div>
    </div>
</div>

<script>
    let currentSection = 'overview';
    function showSection(section) {
        document.getElementById('overviewSection').style.display = section === 'overview' ? 'block' : 'none';
        document.getElementById('sessionsSection').style.display = section === 'sessions' ? 'block' : 'none';
        document.getElementById('settingsSection').style.display = section === 'settings' ? 'block' : 'none';
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        if(section === 'overview') document.querySelector('.nav-item:first-child').classList.add('active');
        if(section === 'sessions') document.querySelectorAll('.nav-item')[1].classList.add('active');
        if(section === 'settings') document.querySelectorAll('.nav-item')[2].classList.add('active');
        if(section === 'sessions') loadSessions();
        if(section === 'overview') loadStats();
    }

    async function loadStats() {
        try {
            const res = await fetch('/active');
            const data = await res.json();
            document.getElementById('totalSessions').innerText = data.count || 0;
            document.getElementById('activeSessions').innerText = data.count || 0;
            const uptimeRes = await fetch('/ping');
            const uptimeData = await uptimeRes.json();
            document.getElementById('uptime').innerText = uptimeData.uptime || 'N/A';
            document.getElementById('totalCommands').innerText = '128';
        } catch(e) { console.error(e); }
    }

    async function loadSessions() {
        try {
            const res = await fetch('/active');
            const data = await res.json();
            const tbody = document.getElementById('sessionsBody');
            if(data.numbers && data.numbers.length) {
                tbody.innerHTML = '';
                for(let num of data.numbers) {
                    const statusRes = await fetch(`/status?number=${num}`);
                    const statusData = await statusRes.json();
                    const statsRes = await fetch(`/stats?number=${num}`);
                    const statsData = await statsRes.json();
                    const row = tbody.insertRow();
                    row.innerHTML = `
                        <td>${num}</td><td><span style="color:#00ff88">● ONLINE</span></td>
                        <td>${statusData.uptime || 0}s</td>
                        <td>${statsData.stats?.messagesReceived || 0}</td>
                        <td>${statsData.stats?.commandsUsed || 0}</td>
                        <td class="action-buttons">
                            <button class="action-btn view" onclick="viewSession('${num}')"><i class="fas fa-eye"></i></button>
                            <button class="action-btn reconnect" onclick="reconnectSession('${num}')"><i class="fas fa-sync-alt"></i></button>
                            <button class="action-btn disconnect" onclick="disconnectSession('${num}')"><i class="fas fa-power-off"></i></button>
                        </td>
                    `;
                }
            } else {
                tbody.innerHTML = '<tr><td colspan="6">No active sessions</td></tr>';
            }
        } catch(e) { console.error(e); }
    }

    async function reconnectAll() { if(confirm('Reconnect all bots?')) { await fetch('/connect-all'); alert('Reconnecting...'); setTimeout(loadSessions,3000); } }
    async function disconnectAll() { if(confirm('Disconnect ALL bots permanently?')) { await fetch('/disconnect-all'); alert('All disconnected'); loadSessions(); } }
    async function reconnectSession(num) { await fetch(`/code?number=${num}`); alert(`Reconnecting ${num}`); setTimeout(loadSessions,2000); }
    async function disconnectSession(num) { if(confirm(`Disconnect ${num}?`)) { await fetch(`/disconnect?number=${num}`); loadSessions(); } }
    function viewSession(num) { window.location.href = `/config?number=${num}`; }
    function updateAdminKey() { let newKey = document.getElementById('newKey').value; if(newKey) { localStorage.setItem('admin_key', newKey); alert('Key updated locally. Restart server for full effect.'); } }

    loadStats();
    setInterval(loadStats, 15000);
</script>
</body>
</html>
