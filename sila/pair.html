<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JAMALI MD | Pair Device</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:radial-gradient(circle at 10% 20%,#050b1a,#010105);font-family:'Inter',sans-serif;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
        .glass{max-width:500px;width:100%;background:rgba(12,15,30,0.6);backdrop-filter:blur(12px);border-radius:32px;border:1px solid rgba(0,246,255,0.2);padding:28px;box-shadow:0 25px 40px rgba(0,0,0,0.4)}
        .logo{text-align:center;margin-bottom:20px}
        .logo i{font-size:3rem;background:linear-gradient(135deg,#00f6ff,#b400ff);-webkit-background-clip:text;background-clip:text;color:transparent}
        h1{font-size:1.8rem;text-align:center;margin-bottom:15px;background:linear-gradient(135deg,#fff,#00f6ff);-webkit-background-clip:text;background-clip:text;color:transparent}
        .info{background:#0a0d1a;border-radius:20px;padding:12px 16px;margin:20px 0}
        .info-row{display:flex;justify-content:space-between;margin:8px 0}
        .info-row a{color:#00ff88;text-decoration:none}
        .status{display:flex;align-items:center;justify-content:center;gap:8px;margin:15px 0}
        .dot{width:8px;height:8px;background:#0f0;border-radius:50%;animation:pulse 1s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
        input{width:100%;background:#05080f;border:1px solid #2a2f50;border-radius:60px;padding:14px 20px;color:#fff;outline:none;margin:15px 0}
        input:focus{border-color:#00f6ff}
        button{width:100%;background:linear-gradient(95deg,#00c6fb,#005bea);border:none;border-radius:60px;padding:14px;font-weight:600;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px}
        .code-box{background:#000000aa;border-radius:28px;padding:20px;text-align:center;border:1px solid #b400ff;cursor:pointer;margin-top:20px}
        .code{font-size:2rem;letter-spacing:6px;font-weight:800;color:#b400ff}
        .footer{text-align:center;font-size:0.7rem;margin-top:20px;opacity:0.6}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(100px);background:#111;padding:10px 20px;border-radius:40px;transition:0.3s}
        .toast.show{transform:translateX(-50%) translateY(0)}
    </style>
</head>
<body>
<div class="glass">
    <div class="logo"><i class="fas fa-bolt"></i></div>
    <h1>⚡ JAMALI MD</h1>
    <div class="info">
        <div class="info-row"><span><i class="fas fa-crown"></i> Owner</span><span><strong>JAMALI TECH TZ</strong> <i class="fab fa-whatsapp"></i> <a href="https://wa.me/255784062158">+255 784 062 158</a></span></div>
        <div class="info-row"><span><i class="fas fa-hashtag"></i> Channel</span><span><a href="https://whatsapp.com/channel/0029VbC7AgJK5cD71vGIpO3h" target="_blank">Join Channel →</a></span></div>
    </div>
    <div class="status"><div class="dot"></div><span>SYSTEM READY</span></div>
    <input type="tel" id="phone" placeholder="Enter number with country code" value="255">
    <button id="genBtn"><i class="fas fa-key"></i> GENERATE PAIRING CODE</button>
    <div class="code-box" id="codeBox">
        <div class="code" id="codeDisplay">—— —— ——</div>
        <div style="font-size:0.7rem;margin-top:6px"><i class="fas fa-copy"></i> tap to copy</div>
    </div>
    <div class="footer">⚡ JAMALI TECH TZ • SECURE PAIRING</div>
</div>
<div id="toast" class="toast"></div>
<script>
    function toast(msg,type='info'){
        let t=document.getElementById('toast');
        t.innerText=msg;
        t.style.borderLeftColor=type==='error'?'#ff4444':'#00f6ff';
        t.classList.add('show');
        setTimeout(()=>t.classList.remove('show'),3000);
    }
    document.getElementById('genBtn').onclick=async ()=>{
        let num=document.getElementById('phone').value.replace(/\D/g,'');
        if(num.length<9){toast('Invalid number','error');return;}
        let btn=document.getElementById('genBtn');
        let original=btn.innerHTML;
        btn.innerHTML='<i class="fas fa-spinner fa-pulse"></i> PROCESSING...';
        btn.disabled=true;
        let codeDiv=document.getElementById('codeDisplay');
        codeDiv.innerText='⏳';
        try{
            let res=await fetch(`/code?number=${num}`);
            let data=await res.json();
            if(data.code) codeDiv.innerText=data.code;
            else if(data.status==='already_connected') codeDiv.innerText='ALREADY ACTIVE';
            else codeDiv.innerText='FAILED';
        }catch(e){ codeDiv.innerText='ERROR'; }
        btn.innerHTML=original;
        btn.disabled=false;
    };
    document.getElementById('codeBox').onclick=()=>{
        let code=document.getElementById('codeDisplay').innerText;
        if(code && !['—— —— ——','FAILED','ERROR','ALREADY ACTIVE','⏳'].includes(code)){
            navigator.clipboard.writeText(code);
            toast('Copied!');
        } else toast('No code to copy','error');
    };
</script>
</body>
</html>
