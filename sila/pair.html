<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>JAMALI MD | Connect Device</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{
            background: radial-gradient(circle at 30% 10%, #0e1a2a, #020408);
            font-family:'Inter',sans-serif;
            color:#fff;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }
        .glass-card{
            max-width:550px;
            width:100%;
            background:rgba(20,25,40,0.6);
            backdrop-filter:blur(18px);
            border-radius:48px;
            border:1px solid rgba(0,255,255,0.3);
            padding:2rem;
            box-shadow:0 30px 50px rgba(0,0,0,0.6);
            transition:0.3s;
        }
        .logo-circle{
            width:100px;
            height:100px;
            margin:0 auto 20px;
            background:linear-gradient(135deg,#00f6ff,#b400ff);
            border-radius:50%;
            display:flex;
            align-items:center;
            justify-content:center;
        }
        .logo-circle i{font-size:3rem;color:#fff;}
        h1{
            text-align:center;
            font-family:'Orbitron',monospace;
            font-size:2rem;
            background:linear-gradient(135deg,#00f6ff,#b400ff);
            -webkit-background-clip:text;
            background-clip:text;
            -webkit-text-fill-color:transparent;
            margin-bottom:20px;
        }
        .badge{
            background:rgba(0,0,0,0.5);
            border-radius:40px;
            padding:8px 16px;
            display:inline-block;
            margin-bottom:25px;
            font-size:0.8rem;
            letter-spacing:1px;
        }
        .info-grid{
            display:grid;
            grid-template-columns:1fr 1fr;
            gap:15px;
            background:rgba(0,0,0,0.3);
            border-radius:28px;
            padding:20px;
            margin:20px 0;
        }
        .info-item{text-align:center;}
        .info-item i{font-size:1.5rem;color:#00f6ff;margin-bottom:8px;display:block;}
        .input-field{
            display:flex;
            background:rgba(0,0,0,0.5);
            border-radius:60px;
            border:1px solid rgba(0,246,255,0.5);
            margin:25px 0;
            overflow:hidden;
        }
        .input-field i{
            padding:18px;
            background:#00f6ff20;
            color:#00f6ff;
        }
        .input-field input{
            flex:1;
            background:transparent;
            border:none;
            padding:0 15px;
            color:#fff;
            font-size:1rem;
            outline:none;
        }
        button{
            width:100%;
            background:linear-gradient(95deg,#00c6fb,#005bea);
            border:none;
            border-radius:60px;
            padding:16px;
            font-weight:bold;
            font-size:1.1rem;
            color:white;
            cursor:pointer;
            transition:0.3s;
            margin-bottom:25px;
        }
        button:hover{transform:scale(1.02);box-shadow:0 0 15px #00c6fb;}
        .code-box{
            background:#00000070;
            border-radius:32px;
            padding:20px;
            text-align:center;
            border:1px solid #b400ff;
            cursor:pointer;
        }
        .code-display{
            font-size:2rem;
            letter-spacing:8px;
            font-weight:bold;
            color:#b400ff;
        }
        .footer-note{
            margin-top:25px;
            text-align:center;
            font-size:0.7rem;
            opacity:0.6;
        }
        @media(max-width:500px){.glass-card{padding:1.5rem}.code-display{font-size:1.5rem;letter-spacing:4px}}
    </style>
</head>
<body>
<div class="glass-card">
    <div class="logo-circle"><i class="fas fa-bolt"></i></div>
    <h1>JAMALI MD</h1>
    <div style="text-align:center"><span class="badge"><i class="fas fa-shield-alt"></i> SECURE PAIRING</span></div>

    <div class="info-grid">
        <div class="info-item"><i class="fas fa-crown"></i>Owner<br><strong>JAMALI TECH TZ</strong></div>
        <div class="info-item"><i class="fab fa-whatsapp"></i>Contact<br><a href="https://wa.me/255784062158" target="_blank" style="color:#00ff88">+255 784 062 158</a></div>
        <div class="info-item"><i class="fas fa-hashtag"></i>Channel<br><a href="https://whatsapp.com/channel/0029VbC7AgJK5cD71vGIpO3h" target="_blank" style="color:#00ff88">Join</a></div>
        <div class="info-item"><i class="fas fa-check-circle"></i>Status<br><span style="color:#0f0">● Online</span></div>
    </div>

    <div class="input-field">
        <i class="fas fa-phone-alt"></i>
        <input type="tel" id="phoneNumber" placeholder="Enter number with country code (e.g., 255784062158)" value="255">
    </div>
    <button id="pairBtn"><i class="fas fa-link"></i> GENERATE PAIRING CODE</button>

    <div class="code-box" onclick="copyCode()">
        <div style="font-size:0.8rem;opacity:0.7">PAIRING CODE</div>
        <div class="code-display" id="pairCode">—— —— ——</div>
        <div style="font-size:0.7rem;margin-top:8px"><i class="fas fa-copy"></i> tap to copy</div>
    </div>

    <div class="footer-note">Powered by JAMALI TECH TZ | © 2026</div>
</div>

<script>
    let generating = false;
    async function generatePair() {
        if(generating) return;
        let raw = document.getElementById('phoneNumber').value.replace(/\D/g,'');
        if(raw.length < 9) {
            alert("Invalid number. Use country code like 255...");
            return;
        }
        generating = true;
        let btn = document.getElementById('pairBtn');
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> PROCESSING...';
        btn.disabled = true;
        let codeDiv = document.getElementById('pairCode');
        codeDiv.innerText = '⏳';
        try {
            let res = await fetch(`/code?number=${raw}`);
            let data = await res.json();
            if(data.code) {
                codeDiv.innerText = data.code;
            } else if(data.status === 'already_connected') {
                codeDiv.innerText = 'ALREADY ACTIVE';
            } else {
                codeDiv.innerText = 'FAILED';
            }
        } catch(e) {
            codeDiv.innerText = 'ERROR';
        }
        btn.innerHTML = '<i class="fas fa-link"></i> GENERATE PAIRING CODE';
        btn.disabled = false;
        generating = false;
    }
    function copyCode() {
        let code = document.getElementById('pairCode').innerText;
        if(code && code !== '—— —— ——' && code !== 'FAILED' && code !== 'ERROR' && code !== 'ALREADY ACTIVE' && code !== '⏳') {
            navigator.clipboard.writeText(code);
            alert('Code copied!');
        }
    }
    document.getElementById('pairBtn').onclick = generatePair;
</script>
</body>
</html>
