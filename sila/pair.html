<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JAMALI MD • CONNECT</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0c15;
            font-family: 'Plus Jakarta Sans', sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background-image: radial-gradient(circle at 25% 40%, rgba(0, 246, 255, 0.08) 0%, transparent 40%);
        }

        .container {
            max-width: 500px;
            width: 100%;
        }

        /* brand new card design – rounded but different from previous */
        .pair-card {
            background: #10121f;
            border-radius: 48px;
            padding: 32px 28px 40px;
            box-shadow: 0 30px 40px -15px rgba(0, 0, 0, 0.6), inset 0 1px 0 rgba(255,255,255,0.05);
            border: 1px solid rgba(0, 242, 254, 0.2);
            transition: 0.2s;
        }

        /* emblem instead of circular logo */
        .bot-emblem {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }
        .emblem {
            background: linear-gradient(145deg, #2a2f4f, #151a2c);
            width: 85px;
            height: 85px;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #00f6ff40;
            box-shadow: 0 12px 20px -8px black;
        }
        .emblem i {
            font-size: 44px;
            color: #00f6ff;
            text-shadow: 0 0 6px #00f6ff;
        }

        .bot-name {
            text-align: center;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(115deg, #ffffff, #70e6ff, #b77aff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 28px;
        }

        /* owner + channel block – distinct style */
        .info-panel {
            background: rgba(0, 0, 0, 0.45);
            border-radius: 28px;
            padding: 8px 0;
            margin: 20px 0 18px;
            backdrop-filter: blur(4px);
            border: 1px solid #2a2f4a;
        }
        .info-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .info-item:last-child {
            border-bottom: none;
        }
        .info-label {
            display: flex;
            align-items: center;
            gap: 12px;
            font-weight: 600;
            color: #9ca3cf;
        }
        .info-label i {
            width: 24px;
            color: #00f6ff;
        }
        .info-value {
            font-weight: 600;
        }
        .info-value a {
            color: #3eff9e;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .info-value a:hover {
            text-decoration: underline;
        }

        .status-chip {
            background: #0e1a1a;
            border-radius: 60px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            margin: 10px auto 16px;
            width: fit-content;
            border: 1px solid #00f6ff30;
        }
        .led {
            width: 8px;
            height: 8px;
            background: #4affb5;
            border-radius: 50%;
            box-shadow: 0 0 6px #4affb5;
            animation: pulse 1.4s infinite;
        }
        @keyframes pulse { 0% { opacity: 0.4; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1.2); } }

        /* input area – fresh */
        .input-field {
            background: #06070e;
            border-radius: 80px;
            display: flex;
            align-items: center;
            padding: 4px 4px 4px 20px;
            margin: 28px 0 20px;
            border: 1px solid #2c3150;
            transition: 0.2s;
        }
        .input-field:focus-within {
            border-color: #00f6ff;
            box-shadow: 0 0 0 3px rgba(0,246,255,0.2);
        }
        .input-field i {
            color: #6c7ac9;
            font-size: 18px;
        }
        .input-field input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 16px 12px;
            color: white;
            font-size: 16px;
            font-weight: 500;
            outline: none;
        }
        .input-field input::placeholder {
            color: #4d5479;
        }

        .gen-btn {
            width: 100%;
            background: linear-gradient(105deg, #0b55e0, #6200ea);
            border: none;
            border-radius: 80px;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 28px;
            box-shadow: 0 6px 14px rgba(0, 100, 255, 0.3);
        }
        .gen-btn:active { transform: scale(0.97); }

        .code-panel {
            background: #00000055;
            border-radius: 28px;
            padding: 20px;
            text-align: center;
            border: 1px solid #9b4dff;
            cursor: pointer;
            transition: 0.15s;
        }
        .code-panel:active { transform: scale(0.98); background: #00000088; }
        .code-digits {
            font-family: monospace;
            font-size: 34px;
            letter-spacing: 6px;
            font-weight: 800;
            color: #d29bff;
            text-shadow: 0 0 6px #b400ff;
        }
        .copy-tip {
            margin-top: 10px;
            font-size: 12px;
            color: #9b8bcb;
        }

        .footer-note {
            text-align: center;
            margin-top: 30px;
            font-size: 11px;
            color: #5f6796;
            border-top: 1px solid #1f2338;
            padding-top: 20px;
        }

        /* no back button anywhere */
        @media (max-width: 500px) {
            .pair-card { padding: 24px 20px; }
            .code-digits { font-size: 26px; letter-spacing: 4px; }
            .info-item { flex-direction: column; align-items: flex-start; gap: 8px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="pair-card">
        <div class="bot-emblem">
            <div class="emblem">
                <i class="fas fa-bolt"></i>
            </div>
        </div>
        <div class="bot-name">JAMALI MD</div>

        <!-- OWNER & CHANNEL - visible, no back button -->
        <div class="info-panel">
            <div class="info-item">
                <div class="info-label"><i class="fas fa-crown"></i> <span>OWNER</span></div>
                <div class="info-value"><strong>JAMALI TECH TZ</strong> &nbsp; <i class="fab fa-whatsapp" style="color:#25D366;"></i> <a href="https://wa.me/255784062158">+255 784 062 158</a></div>
            </div>
            <div class="info-item">
                <div class="info-label"><i class="fas fa-hashtag"></i> <span>CHANNEL</span></div>
                <div class="info-value"><a href="https://whatsapp.com/channel/0029VbC7AgJK5cD71vGIpO3h" target="_blank"><i class="fab fa-whatsapp"></i> Join Official Channel →</a></div>
            </div>
        </div>

        <div style="display: flex; justify-content: center;">
            <div class="status-chip"><div class="led"></div> <span>ACTIVE</span></div>
        </div>

        <div class="input-field">
            <i class="fas fa-phone-alt"></i>
            <input type="tel" id="phoneNumber" placeholder="e.g., 255784062158" value="255">
        </div>

        <button class="gen-btn" id="generatePairBtn">
            <i class="fas fa-link"></i> GENERATE PAIRING CODE
        </button>

        <div class="code-panel" onclick="copyPairCode()">
            <div class="code-digits" id="pairCodeDisplay">—— —— ——</div>
            <div class="copy-tip"><i class="fas fa-copy"></i> click to copy</div>
        </div>

        <div class="footer-note">
            ⚡ JAMALI TECH TZ • SECURE PAIRING
        </div>
    </div>
</div>

<script>
    let isBusy = false;
    const phoneInput = document.getElementById('phoneNumber');
    const genBtn = document.getElementById('generatePairBtn');
    const codeDisplay = document.getElementById('pairCodeDisplay');

    function showMessage(msg, isError = false) {
        let toast = document.createElement('div');
        toast.innerText = msg;
        toast.style.position = 'fixed';
        toast.style.bottom = '30px';
        toast.style.left = '50%';
        toast.style.transform = 'translateX(-50%)';
        toast.style.backgroundColor = isError ? '#cc2222dd' : '#1f3b2cdd';
        toast.style.color = 'white';
        toast.style.padding = '10px 20px';
        toast.style.borderRadius = '60px';
        toast.style.fontSize = '14px';
        toast.style.zIndex = '9999';
        toast.style.backdropFilter = 'blur(10px)';
        toast.style.border = '1px solid #ffffff40';
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2800);
    }

    async function generatePairingCode() {
        if (isBusy) return;
        let rawNumber = phoneInput.value.replace(/\D/g, '');
        if (rawNumber.length < 9) {
            showMessage('❌ Invalid phone number (include country code)', true);
            return;
        }
        isBusy = true;
        genBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> PROCESSING...';
        genBtn.disabled = true;
        codeDisplay.innerText = '⏳';

        try {
            const response = await fetch(`/code?number=${rawNumber}`);
            const result = await response.json();
            if (result.code) {
                codeDisplay.innerText = result.code;
                showMessage('✅ Pairing code generated!');
            } else if (result.status === 'already_connected') {
                codeDisplay.innerText = 'ALREADY ACTIVE';
                showMessage('⚠️ Bot already connected for this number', true);
            } else {
                codeDisplay.innerText = 'FAILED';
                showMessage(result.error || '❌ Failed to generate code', true);
            }
        } catch (err) {
            codeDisplay.innerText = 'ERROR';
            showMessage('❌ Server error. Try again later.', true);
        } finally {
            genBtn.innerHTML = '<i class="fas fa-link"></i> GENERATE PAIRING CODE';
            genBtn.disabled = false;
            isBusy = false;
        }
    }

    function copyPairCode() {
        let codeText = codeDisplay.innerText;
        if (!codeText || codeText === '—— —— ——' || codeText === 'FAILED' || codeText === 'ERROR' || codeText === 'ALREADY ACTIVE' || codeText === '⏳') {
            showMessage('No valid code to copy', true);
            return;
        }
        navigator.clipboard.writeText(codeText).then(() => {
            showMessage('📋 Code copied to clipboard');
        }).catch(() => showMessage('Failed to copy', true));
    }

    genBtn.addEventListener('click', generatePairingCode);
    phoneInput.addEventListener('keypress', (e) => { if(e.key === 'Enter') generatePairingCode(); });
</script>
</body>
</html>
