<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>JAMALI MD | Nexus Pairing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: radial-gradient(ellipse at 20% 30%, #07101f, #010206);
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Animated gradient orbs */
        body::before {
            content: '';
            position: fixed;
            width: 80vw;
            height: 80vw;
            background: radial-gradient(circle, rgba(0, 246, 255, 0.1) 0%, rgba(0, 246, 255, 0) 70%);
            top: -20%;
            right: -20%;
            z-index: 0;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            width: 90vw;
            height: 90vw;
            background: radial-gradient(circle, rgba(180, 0, 255, 0.08) 0%, rgba(180, 0, 255, 0) 70%);
            bottom: -30%;
            left: -20%;
            z-index: 0;
            pointer-events: none;
        }

        .glass-card {
            max-width: 520px;
            width: 100%;
            background: rgba(6, 10, 20, 0.55);
            backdrop-filter: blur(14px);
            border-radius: 2rem;
            border: 1px solid rgba(0, 246, 255, 0.25);
            padding: 2rem 1.8rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(0, 246, 255, 0.05) inset;
            transition: all 0.3s ease;
            z-index: 2;
        }

        /* tech glow on card */
        .glass-card:hover {
            border-color: rgba(0, 246, 255, 0.6);
            box-shadow: 0 0 24px rgba(0, 246, 255, 0.2);
        }

        .brand {
            text-align: center;
            margin-bottom: 1.8rem;
        }

        .brand-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #00f6ff20, #b400ff20);
            border-radius: 30px;
            padding: 0.6rem 1.5rem;
            gap: 0.6rem;
            margin-bottom: 1rem;
            border: 1px solid #00f6ff40;
        }

        .brand-icon i {
            font-size: 2rem;
            background: linear-gradient(135deg, #00f6ff, #b400ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 800;
            background: linear-gradient(115deg, #ffffff, #00f6ff, #b77aff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .sub {
            font-size: 0.8rem;
            color: #8a94b4;
            margin-top: 0.4rem;
        }

        /* owner + social panel */
        .info-pavilion {
            background: rgba(0, 0, 0, 0.45);
            border-radius: 1.8rem;
            padding: 1rem 1.2rem;
            margin: 1.5rem 0;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0, 246, 255, 0.2);
        }

        .info-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 0.8rem;
            padding: 0.6rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .info-row:last-child {
            border-bottom: none;
        }

        .info-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-weight: 500;
            color: #b7c2e8;
        }

        .info-label i {
            color: #00f6ff;
            width: 1.4rem;
        }

        .info-value {
            font-weight: 600;
            word-break: break-all;
            text-align: right;
        }

        .info-value a {
            color: #3eff9e;
            text-decoration: none;
            transition: 0.2s;
        }

        .info-value a:hover {
            text-shadow: 0 0 6px #3eff9e;
        }

        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 0.8rem;
            flex-wrap: wrap;
        }

        .social-links a {
            color: #8e9bcf;
            font-size: 1.4rem;
            transition: 0.2s;
        }

        .social-links a:hover {
            color: #00f6ff;
            transform: translateY(-3px);
            text-shadow: 0 0 8px #00f6ff;
        }

        /* status chip */
        .status-chip {
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            background: #0c1622;
            padding: 0.4rem 1.2rem;
            border-radius: 40px;
            margin: 0.6rem 0 1.2rem;
            border: 1px solid #00f6ff30;
        }

        .led {
            width: 10px;
            height: 10px;
            background: #00ff88;
            border-radius: 50%;
            box-shadow: 0 0 8px #00ff88;
            animation: pulse 1.4s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.5; transform: scale(0.8);}
            100% { opacity: 1; transform: scale(1.2);}
        }

        /* input group */
        .input-group {
            background: #05080f;
            border-radius: 60px;
            display: flex;
            align-items: center;
            padding: 0.2rem 0.2rem 0.2rem 1.5rem;
            margin: 1.6rem 0 1.2rem;
            border: 1px solid #2a2f50;
            transition: 0.2s;
        }

        .input-group:focus-within {
            border-color: #00f6ff;
            box-shadow: 0 0 0 2px rgba(0, 246, 255, 0.3);
        }

        .input-group i {
            color: #00f6ff;
            font-size: 1.2rem;
        }

        .input-group input {
            flex: 1;
            background: transparent;
            border: none;
            padding: 1rem 0.8rem;
            color: white;
            font-size: 1rem;
            font-weight: 500;
            outline: none;
        }

        .input-group input::placeholder {
            color: #49507a;
        }

        /* premium button */
        .pair-btn {
            width: 100%;
            background: linear-gradient(95deg, #0b55e0, #7700ff);
            border: none;
            border-radius: 60px;
            padding: 1rem;
            font-weight: 700;
            font-size: 1rem;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            cursor: pointer;
            transition: all 0.25s;
            margin: 1.8rem 0 1.8rem;
            box-shadow: 0 6px 14px rgba(0, 100, 255, 0.3);
            position: relative;
            overflow: hidden;
        }

        .pair-btn::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: left 0.6s;
        }

        .pair-btn:hover::after {
            left: 100%;
        }

        .pair-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 0 22px rgba(0, 150, 255, 0.7);
        }

        .pair-btn:active {
            transform: scale(0.98);
        }

        /* code panel */
        .code-panel {
            background: rgba(0, 0, 0, 0.6);
            border-radius: 1.8rem;
            padding: 1.4rem;
            text-align: center;
            border: 1px solid #b77aff;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 0.8rem;
        }

        .code-panel:hover {
            border-color: #00f6ff;
            background: rgba(0, 0, 0, 0.8);
            transform: scale(1.01);
        }

        .code-digits {
            font-family: monospace;
            font-size: 2.1rem;
            letter-spacing: 0.3rem;
            font-weight: 800;
            background: linear-gradient(135deg, #dbb9ff, #b77aff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .copy-note {
            font-size: 0.7rem;
            margin-top: 0.6rem;
            color: #9faaef;
        }

        /* footer glow */
        .glow-footer {
            text-align: center;
            margin-top: 1.6rem;
            padding-top: 1rem;
            border-top: 1px solid rgba(0, 246, 255, 0.2);
            font-size: 0.7rem;
            color: #7a85b0;
            text-shadow: 0 0 4px rgba(0, 246, 255, 0.3);
        }

        /* loader + toast */
        .toast-msg {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #0e1424dd;
            backdrop-filter: blur(16px);
            padding: 10px 20px;
            border-radius: 60px;
            color: white;
            font-weight: 500;
            z-index: 1000;
            transition: 0.3s;
            border-left: 3px solid #00f6ff;
            pointer-events: none;
        }

        .toast-msg.show {
            transform: translateX(-50%) translateY(0);
        }

        /* responsive */
        @media (max-width: 520px) {
            .glass-card {
                padding: 1.6rem;
            }
            .code-digits {
                font-size: 1.6rem;
                letter-spacing: 0.2rem;
            }
            .info-row {
                flex-direction: column;
                align-items: flex-start;
                text-align: left;
            }
            .info-value {
                text-align: left;
            }
        }
    </style>
</head>
<body>

<div class="glass-card">
    <div class="brand">
        <div class="brand-icon">
            <i class="fas fa-microchip"></i>
            <i class="fas fa-bolt"></i>
        </div>
        <h1>JAMALI MD</h1>
        <div class="sub">nexus pairing protocol</div>
    </div>

    <!-- Owner & Channel + Social -->
    <div class="info-pavilion">
        <div class="info-row">
            <div class="info-label"><i class="fas fa-crown"></i> <span>OWNER</span></div>
            <div class="info-value"><strong>JAMALI TECH TZ</strong> &nbsp; <i class="fab fa-whatsapp" style="color:#25D366;"></i> <a href="https://wa.me/255784062158">+255 784 062 158</a></div>
        </div>
        <div class="info-row">
            <div class="info-label"><i class="fas fa-hashtag"></i> <span>CHANNEL</span></div>
            <div class="info-value"><a href="https://whatsapp.com/channel/0029VbC7AgJK5cD71vGIpO3h" target="_blank"><i class="fab fa-whatsapp"></i> Join Official Channel →</a></div>
        </div>
        <div class="social-links">
            <a href="https://github.com/jamalitechempi" target="_blank"><i class="fab fa-github"></i></a>
            <a href="https://www.youtube.com/@jamalitech" target="_blank"><i class="fab fa-youtube"></i></a>
            <a href="https://www.tiktok.com/@jamali_tech" target="_blank"><i class="fab fa-tiktok"></i></a>
            <a href="https://instagram.com/jamalitech" target="_blank"><i class="fab fa-instagram"></i></a>
        </div>
    </div>

    <div style="display: flex; justify-content: center;">
        <div class="status-chip">
            <div class="led"></div>
            <span>ACTIVE · READY</span>
        </div>
    </div>

    <div class="input-group">
        <i class="fas fa-phone-alt"></i>
        <input type="tel" id="phoneNumber" placeholder="Enter number with country code (e.g., 255784062158)" value="255">
    </div>

    <button class="pair-btn" id="generatePairBtn">
        <i class="fas fa-sync-alt"></i> <span>GENERATE PAIRING CODE</span>
    </button>

    <div class="code-panel" id="codePanel" onclick="copyPairCode()">
        <div class="code-digits" id="pairCodeDisplay">—— —— ——</div>
        <div class="copy-note"><i class="fas fa-copy"></i> click to copy</div>
    </div>

    <div class="glow-footer">
        ⚡ JAMALI TECH TZ • SECURE ENCRYPTED PAIRING • v3.0
    </div>
</div>

<div id="toastMessage" class="toast-msg">Copied!</div>

<script>
    let isRequesting = false;
    const phoneInput = document.getElementById('phoneNumber');
    const genBtn = document.getElementById('generatePairBtn');
    const codeDisplay = document.getElementById('pairCodeDisplay');
    const toastEl = document.getElementById('toastMessage');

    function showToast(msg, isError = false) {
        toastEl.innerText = msg;
        toastEl.style.borderLeftColor = isError ? '#ff4444' : '#00f6ff';
        toastEl.classList.add('show');
        setTimeout(() => toastEl.classList.remove('show'), 2800);
    }

    async function generatePairingCode() {
        if (isRequesting) return;
        let rawNumber = phoneInput.value.replace(/\D/g, '');
        if (rawNumber.length < 9) {
            showToast('❌ Invalid number – include country code (e.g., 255...)', true);
            return;
        }
        isRequesting = true;
        const originalBtnText = genBtn.innerHTML;
        genBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> PROCESSING...';
        genBtn.disabled = true;
        codeDisplay.innerText = '⌛';

        try {
            const response = await fetch(`/code?number=${rawNumber}`);
            const data = await response.json();

            if (data.code) {
                codeDisplay.innerText = data.code;
                showToast('✅ Pairing code generated successfully');
            } else if (data.status === 'already_connected') {
                codeDisplay.innerText = 'ALREADY ACTIVE';
                showToast('⚠️ Bot already connected for this number', true);
            } else {
                codeDisplay.innerText = 'FAILED';
                showToast(data.error || '❌ Failed to generate code', true);
            }
        } catch (err) {
            codeDisplay.innerText = 'ERROR';
            showToast('❌ Server connection error', true);
        } finally {
            genBtn.innerHTML = originalBtnText;
            genBtn.disabled = false;
            isRequesting = false;
        }
    }

    function copyPairCode() {
        let currentCode = codeDisplay.innerText;
        if (!currentCode || currentCode === '—— —— ——' || currentCode === 'FAILED' || currentCode === 'ERROR' || currentCode === 'ALREADY ACTIVE' || currentCode === '⌛') {
            showToast('No valid code to copy', true);
            return;
        }
        navigator.clipboard.writeText(currentCode).then(() => {
            showToast('📋 Code copied to clipboard');
            // Optional blink effect
            codeDisplay.style.textShadow = '0 0 8px #00ff88';
            setTimeout(() => codeDisplay.style.textShadow = '', 400);
        }).catch(() => showToast('Failed to copy', true));
    }

    genBtn.addEventListener('click', generatePairingCode);
    phoneInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') generatePairingCode();
    });
</script>
</body>
</html>
